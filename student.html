<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RACE Dashboard</title>
  <style>
    :root{
      --bg: #0b1220;
      --bg-soft:#0f172a;
      --card:#111c33;
      --card-2:#0f1a30;
      --text:#e5eefc;
      --muted:#93a4c3;
      --line: rgba(148,163,184,.18);
      --primary:#4f8cff;
      --primary-2:#7c5cff;
      --success:#2dd4bf;
      --warning:#f59e0b;
      --danger:#fb7185;
      --shadow: 0 18px 50px rgba(0,0,0,.28);
      --radius: 22px;
    }

    [data-theme="light"]{
      --bg:#eff4ff;
      --bg-soft:#f7faff;
      --card:#ffffff;
      --card-2:#f8fbff;
      --text:#12203a;
      --muted:#60708a;
      --line: rgba(15,23,42,.10);
      --shadow: 0 18px 50px rgba(25, 45, 92, .12);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(79,140,255,.22), transparent 28%),
        radial-gradient(circle at top right, rgba(124,92,255,.18), transparent 22%),
        linear-gradient(180deg, var(--bg), var(--bg-soft));
      color:var(--text);
      overflow-x:hidden;
    }

    button,input,select{font:inherit}
    a{text-decoration:none;color:inherit}
    .hidden{display:none !important}

    .app-shell{min-height:100vh}

    .topbar{
      position:sticky;top:0;z-index:20;
      backdrop-filter: blur(18px);
      background: color-mix(in srgb, var(--bg-soft) 76%, transparent);
      border-bottom:1px solid var(--line);
      padding:14px 22px;
      display:flex;align-items:center;justify-content:space-between;gap:16px;
    }

    .brand{
      display:flex;align-items:center;gap:12px;
      min-width:0;
    }
    .brand-mark{
      width:44px;height:44px;border-radius:14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      display:grid;place-items:center;font-weight:800;color:white;
      box-shadow: 0 10px 30px rgba(79,140,255,.35);
      flex:0 0 auto;
    }
    .brand h1{font-size:16px;line-height:1.1}
    .brand p{font-size:12px;color:var(--muted);margin-top:2px}

    .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .icon-btn, .chip-btn, .primary-btn, .ghost-btn, .danger-btn{
      border:none;cursor:pointer;border-radius:16px;transition:.2s ease;
    }
    .icon-btn{
      width:44px;height:44px;display:grid;place-items:center;
      background:var(--card);color:var(--text);border:1px solid var(--line);
    }
    .icon-btn:hover,.chip-btn:hover,.ghost-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}

    .chip-btn{
      padding:12px 16px;background:var(--card);color:var(--text);border:1px solid var(--line);
      display:flex;align-items:center;gap:10px;font-weight:600;
    }

    .layout{
      display:grid;grid-template-columns: 280px 1fr;min-height:calc(100vh - 74px);
    }

    .sidebar{
      position:sticky;top:74px;height:calc(100vh - 74px);
      padding:18px;border-right:1px solid var(--line);
      background: color-mix(in srgb, var(--bg-soft) 82%, transparent);
      overflow:auto;
    }

    .sidebar-card,.content-card,.login-card,.stat-card,.panel,.table-card{
      background: linear-gradient(180deg, color-mix(in srgb, var(--card) 96%, transparent), color-mix(in srgb, var(--card-2) 98%, transparent));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar-card{padding:18px;margin-bottom:16px}
    .user-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .avatar{
      width:52px;height:52px;border-radius:18px;
      background: linear-gradient(135deg, rgba(79,140,255,.95), rgba(124,92,255,.95));
      display:grid;place-items:center;font-weight:800;color:white;font-size:18px;
      box-shadow: 0 12px 24px rgba(79,140,255,.22);
      flex:0 0 auto;
    }
    .user-meta h3{font-size:16px}
    .user-meta p{font-size:12px;color:var(--muted);margin-top:4px}

    .nav{display:grid;gap:8px}
    .nav button{
      width:100%;text-align:left;padding:14px 14px;border-radius:16px;border:1px solid transparent;
      background:transparent;color:var(--muted);display:flex;align-items:center;gap:12px;font-weight:600;
      cursor:pointer;transition:.2s ease;
    }
    .nav button:hover{background:rgba(79,140,255,.09);color:var(--text);transform:translateX(2px)}
    .nav button.active{background:linear-gradient(135deg, rgba(79,140,255,.20), rgba(124,92,255,.16));color:var(--text);border-color:rgba(79,140,255,.25)}

    .mini-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px
    }
    .mini-stat{
      padding:14px;border-radius:18px;background:rgba(79,140,255,.08);border:1px solid var(--line)
    }
    .mini-stat strong{display:block;font-size:18px;margin-bottom:4px}
    .mini-stat span{font-size:12px;color:var(--muted)}

    .main{
      padding:22px;min-width:0;
    }

    .hero{
      display:grid;grid-template-columns:1.45fr .85fr;gap:18px;margin-bottom:18px;
    }
    .hero-card{
      position:relative;overflow:hidden;padding:24px;border-radius:28px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.14), transparent 26%),
        linear-gradient(135deg, rgba(79,140,255,.95), rgba(124,92,255,.92));
      color:white;box-shadow: 0 22px 60px rgba(79,140,255,.32);
      border:none;
    }
    .hero-card h2{font-size:28px;line-height:1.15;margin-bottom:10px}
    .hero-card p{opacity:.92;max-width:58ch;line-height:1.6}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .primary-btn,.ghost-btn,.danger-btn{padding:13px 18px;font-weight:700;border-radius:16px}
    .primary-btn{background:white;color:#17306b}
    .ghost-btn{background:rgba(255,255,255,.13);color:white;border:1px solid rgba(255,255,255,.22)}
    .danger-btn{background:rgba(251,113,133,.14);color:var(--danger);border:1px solid rgba(251,113,133,.20)}

    .hero-side{
      display:grid;gap:18px;
    }

    .content-card, .panel, .table-card, .login-card{padding:20px}

    .section{display:none;animation:fadeIn .28s ease}
    .section.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

    .section-head{
      display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:16px;flex-wrap:wrap;
    }
    .section-head h3{font-size:22px}
    .section-head p{color:var(--muted);font-size:13px;margin-top:4px}

    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .card{padding:18px;border-radius:22px;background:linear-gradient(180deg, color-mix(in srgb, var(--card) 96%, transparent), color-mix(in srgb, var(--card-2) 98%, transparent));border:1px solid var(--line)}

    .metric-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px}
    .metric-top span{font-size:13px;color:var(--muted)}
    .metric-top .badge{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .badge.green{background:rgba(45,212,191,.14);color:var(--success)}
    .badge.blue{background:rgba(79,140,255,.14);color:var(--primary)}
    .badge.amber{background:rgba(245,158,11,.14);color:var(--warning)}
    .badge.pink{background:rgba(251,113,133,.14);color:var(--danger)}

    .metric-value{font-size:34px;font-weight:800;line-height:1;margin-bottom:6px}
    .metric-sub{color:var(--muted);font-size:13px}

    .progress-wrap{margin-top:14px}
    .progress-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;color:var(--muted)}
    .progress-bg{height:10px;border-radius:999px;background:rgba(148,163,184,.18);overflow:hidden}
    .progress-bar{height:100%;border-radius:inherit;background:linear-gradient(90deg, var(--primary), var(--primary-2));width:0;transition:width .6s ease}

    .controls{display:flex;gap:10px;flex-wrap:wrap}
    .input, select{
      width:100%;padding:13px 14px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.02);color:var(--text);outline:none;
    }
    [data-theme="light"] .input, [data-theme="light"] select{background:#fff}
    .input:focus, select:focus{border-color:rgba(79,140,255,.5);box-shadow:0 0 0 4px rgba(79,140,255,.12)}

    .searchbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .searchbar .input{min-width:280px;flex:1}

    .table-card{overflow:auto}
    table{width:100%;border-collapse:collapse;min-width:720px}
    th,td{padding:14px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
    th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
    tr:hover td{background:rgba(79,140,255,.045)}

    .status{padding:7px 10px;border-radius:999px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
    .status::before{content:"";width:8px;height:8px;border-radius:50%}
    .status.done{background:rgba(45,212,191,.14);color:var(--success)} .status.done::before{background:var(--success)}
    .status.pending{background:rgba(245,158,11,.14);color:var(--warning)} .status.pending::before{background:var(--warning)}
    .status.fail{background:rgba(251,113,133,.14);color:var(--danger)} .status.fail::before{background:var(--danger)}

    .timeline{display:grid;gap:12px}
    .timeline-item{display:flex;gap:12px;padding:14px;border-radius:18px;background:rgba(79,140,255,.06);border:1px solid var(--line)}
    .timeline-dot{width:12px;height:12px;border-radius:50%;margin-top:5px;background:linear-gradient(135deg, var(--primary), var(--primary-2));flex:0 0 auto}
    .timeline-item h4{font-size:14px;margin-bottom:4px}
    .timeline-item p{font-size:13px;color:var(--muted);line-height:1.5}

    .login-wrap{
      min-height:100vh;display:grid;place-items:center;padding:24px;
    }
    .login-card{
      width:min(980px,100%);display:grid;grid-template-columns:1.1fr .9fr;gap:0;overflow:hidden;padding:0;
    }
    .login-hero{
      padding:34px;background:
        radial-gradient(circle at top right, rgba(255,255,255,.16), transparent 22%),
        linear-gradient(135deg, rgba(79,140,255,.98), rgba(124,92,255,.92));
      color:white;display:flex;flex-direction:column;justify-content:space-between;min-height:540px;
    }
    .login-hero h2{font-size:38px;line-height:1.05;margin-bottom:12px}
    .login-hero p{opacity:.92;line-height:1.6;max-width:56ch}
    .feature-list{display:grid;gap:12px;margin-top:24px}
    .feature-item{display:flex;gap:10px;align-items:flex-start;background:rgba(255,255,255,.12);padding:14px 16px;border-radius:18px;border:1px solid rgba(255,255,255,.14)}
    .feature-item strong{display:block;font-size:14px;margin-bottom:4px}
    .feature-item span{font-size:13px;opacity:.9;line-height:1.45}
    .login-form{padding:34px;background:linear-gradient(180deg, color-mix(in srgb, var(--card) 98%, transparent), color-mix(in srgb, var(--card-2) 98%, transparent))}
    .login-form h3{font-size:24px;margin-bottom:8px}
    .login-form p{color:var(--muted);font-size:13px;margin-bottom:20px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px}
    .pwd-wrap{position:relative}
    .pwd-wrap .input{padding-right:52px}
    .toggle-pwd{
      position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:var(--muted);cursor:pointer
    }
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-actions{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-top:8px}
    .check{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
    .link{color:var(--primary);font-weight:700;cursor:pointer}
    .auth-btn{width:100%;padding:14px 18px;margin-top:16px;border:none;border-radius:16px;background:linear-gradient(135deg, var(--primary), var(--primary-2));color:white;font-weight:800;cursor:pointer;box-shadow:0 14px 30px rgba(79,140,255,.28)}
    .auth-btn:hover{transform:translateY(-1px)}

    .alert{padding:12px 14px;border-radius:16px;margin-bottom:14px;font-size:13px;display:none}
    .alert.error{background:rgba(251,113,133,.12);color:var(--danger);border:1px solid rgba(251,113,133,.18)}
    .alert.success{background:rgba(45,212,191,.12);color:var(--success);border:1px solid rgba(45,212,191,.18)}

    .toast{
      position:fixed;right:18px;bottom:18px;z-index:99;display:grid;gap:10px
    }
    .toast-item{
      min-width:260px;max-width:340px;padding:14px 16px;border-radius:16px;
      background:color-mix(in srgb, var(--card) 94%, black 6%);color:var(--text);border:1px solid var(--line);box-shadow:var(--shadow)
    }
    .toast-item small{display:block;color:var(--muted);margin-top:4px}

    .footer-note{margin-top:14px;color:var(--muted);font-size:12px;line-height:1.5}
    .section-toolbar{display:flex;gap:10px;flex-wrap:wrap}

    @media (max-width: 1120px){
      .layout{grid-template-columns: 1fr}
      .sidebar{position:relative;top:auto;height:auto;border-right:none;border-bottom:1px solid var(--line)}
      .hero{grid-template-columns:1fr}
      .grid-4,.grid-3,.grid-2,.login-card,.form-row{grid-template-columns:1fr}
      table{min-width:900px}
    }
    @media (max-width: 720px){
      .topbar{padding:12px 14px}
      .main{padding:14px}
      .hero-card h2{font-size:24px}
      .login-hero{min-height:auto}
      .login-hero h2{font-size:30px}
      .chip-btn span{display:none}
      .top-actions{gap:8px}
      .searchbar .input{min-width:100%}
    }
  </style>
</head>

      theme: 'race_theme',
      remember: 'race_remember_user'

    const demoUser = {
      fullName: 'Harsh Gavand',
      username: 'harsh',
      email: 'harsh@example.com',
      password: '123456',
      role: 'Admin',
      dept: 'Analytics',
      initials: 'HG',
      createdAt: new Date().toISOString(),
      stats: {
        projects: 12,
        clients: 8,

    function readUsers(){
      try { return JSON.parse(localStorage.getItem(STORAGE.users) || '[]'); }
      catch { return []; }
    }
    function writeUsers(users){ localStorage.setItem(STORAGE.users, JSON.stringify(users)); }
    function readCurrent(){
      try { return JSON.parse(localStorage.getItem(STORAGE.current) || 'null'); }
      catch { return null; }
    }
    function setCurrent(user){ localStorage.setItem(STORAGE.current, JSON.stringify(user)); }
    function clearCurrent(){ localStorage.removeItem(STORAGE.current); }

    function getTheme(){ return localStorage.getItem(STORAGE.theme) || 'dark'; }
    function setTheme(theme){ localStorage.setItem(STORAGE.theme, theme); document.documentElement.dataset.theme = theme; }

    function ensureDemoUser(){
      const users = readUsers();
      if (!users.some(u => (u.username || '').toLowerCase() === demoUser.username.toLowerCase())) {
        users.push(demoUser);
        writeUsers(users);
      }

    function escapeHtml(str=''){
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function render(html){ document.getElementById('app').innerHTML = html; }

    function showToast(title, message=''){
      const wrap = document.getElementById('toast');
      const item = document.createElement('div');
      item.className = 'toast-item';
      item.innerHTML = `<strong>${escapeHtml(title)}</strong>${message ? `<small>${escapeHtml(message)}</small>` : ''}`;
      wrap.appendChild(item);
      setTimeout(() => { item.style.opacity = '0'; item.style.transform = 'translateY(8px)'; item.style.transition = '.25s ease'; }, 2600);

    }

              <div class="form-row">
                <div class="field"><label>Full Name</label><input class="input" id="regName" placeholder="Your name" /></div>
                <div class="field"><label>Username</label><input class="input" id="regUser" placeholder="Choose username" /></div>
              </div>
              <div class="form-row">
                <div class="field"><label>Email</label><input class="input" id="regEmail" placeholder="you@example.com" /></div>
                <div class="field"><label>Department</label><input class="input" id="regDept" placeholder="Your department" /></div>
              </div>
              <div class="form-row">
                <div class="field"><label>Password</label><div class="pwd-wrap"><input class="input" id="regPass" type="password" placeholder="Create password" /><button class="toggle-pwd" type="button" onclick="togglePwd('regPass', this)">Show</button></div></div>
                <div class="field"><label>Role</label><select id="regRole"><option>Admin</option><option>Manager</option><option>Analyst</option><option>User</option></select></div>
              </div>
              <button class="auth-btn" onclick="handleRegister()">Create Account</button>
              <div class="footer-note" style="margin-top:16px;">Already have an account? <span class="link" onclick="loginView()">Back to login</span></div>
            </div>
          </div>
        </div>
      `);
    }

    function togglePwd(id, btn){
      const el = document.getElementById(id);
      if (!el) return;
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
    }

    function toastInfo(title, message='') { showToast(title, message); }

    function handleLogin(){
      const userInput = (document.getElementById('loginUser')?.value || '').trim();
      const pass = document.getElementById('loginPass')?.value || '';
      const remember = document.getElementById('rememberMe')?.checked;
      const users = readUsers();

      const user = users.find(u =>
        (u.username || '').toLowerCase() === userInput.toLowerCase() ||
        (u.email || '').toLowerCase() === userInput.toLowerCase()
      );

      if (!user || user.password !== pass) {
        loginView('Invalid username/email or password.', true);
        return;
      }

      if (remember) localStorage.setItem(STORAGE.remember, user.username || user.email || '');
      else localStorage.removeItem(STORAGE.remember);

      setCurrent(user);
      showToast('Signed in successfully', `Welcome back, ${user.fullName || user.username || 'User'}`);
      dashboardView(user);
    }

    function handleRegister(){
      const fullName = (document.getElementById('regName')?.value || '').trim();
      const username = (document.getElementById('regUser')?.value || '').trim();
      const email = (document.getElementById('regEmail')?.value || '').trim();
      const dept = (document.getElementById('regDept')?.value || '').trim();
      const password = document.getElementById('regPass')?.value || '';
      const role = document.getElementById('regRole')?.value || 'User';
      const alert = document.getElementById('regAlert');

      if (!fullName || !username || !email || !dept || password.length < 4){
        alert.textContent = 'Please fill all fields and use a password with at least 4 characters.';
        alert.style.display = 'block';
        return;
      }

      const users = readUsers();
      if (users.some(u => (u.username || '').toLowerCase() === username.toLowerCase())){
        alert.textContent = 'Username already exists.';
        alert.style.display = 'block';
        return;
      }

      const newUser = {
        fullName, username, email, password, role, dept,
        initials: (fullName.split(/\s+/).map(p => p[0]).slice(0,2).join('') || 'U').toUpperCase(),
        createdAt: new Date().toISOString(),
        stats: { projects: 1, clients: 1, tasks: 5, uptime: 98.6 }
      };
      users.push(newUser);
      writeUsers(users);
      setCurrent(newUser);
      showToast('Account created', 'You are now logged in.');
      dashboardView(newUser);
    }

    function logout(){
      clearCurrent();
      showToast('Logged out', 'See you next time.');
      loginView();
    }

    function navButton(label, icon, section){
      return `<button class="nav-btn ${section === 'overview' ? 'active' : ''}" data-section="${section}" onclick="showSection('${section}', this)">${icon}<span>${label}</span></button>`;
    }

                    <div class="timeline-item"><div class="timeline-dot"></div><div><h4>Username</h4><p>${escapeHtml(u.username || '')}</p></div></div>
                    <div class="timeline-item" style="margin-top:10px"><div class="timeline-dot"></div><div><h4>Role</h4><p>${escapeHtml(u.role || 'User')}</p></div></div>
                    <div class="timeline-item" style="margin-top:10px"><div class="timeline-dot"></div><div><h4>Joined</h4><p>${new Date(u.createdAt || Date.now()).toLocaleString()}</p></div></div>
                  </div>
                </div>
              </div>

              <div class="section" id="settings">
                <div class="section-head"><div><h3>Settings</h3><p>Appearance and app preferences.</p></div></div>
                <div class="grid-2">
                  <div class="content-card">
                    <div class="field">
                      <label>Theme</label>
                      <select id="themeSelect" onchange="applyTheme(this.value)">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                      </select>
                    </div>
                    <div class="field">
                      <label>Dashboard density</label>
                      <select onchange="showToast('Preference saved', 'Density updated')">
                        <option>Comfortable</option>
                        <option>Compact</option>
                        <option>Spacious</option>
                      </select>
                    </div>
                    <button class="chip-btn" onclick="showToast('Settings', 'Preferences saved')">💾 Save preferences</button>
                  </div>
                  <div class="content-card">
                    <div class="section-head" style="margin-bottom:12px"><div><h3 style="font-size:18px">Accessibility</h3></div></div>
                    <div class="timeline-item"><div class="timeline-dot"></div><div><h4>Keyboard friendly</h4><p>All controls are reachable and responsive.</p></div></div>
                    <div class="timeline-item" style="margin-top:10px"><div class="timeline-dot"></div><div><h4>Responsive design</h4><p>Works on desktop, tablet, and mobile screens.</p></div></div>
                  </div>
                </div>
              </div>
            </main>
          </div>
        </div>
      `);
      document.documentElement.dataset.theme = getTheme();
      const themeSel = document.getElementById('themeSelect');
      if (themeSel) themeSel.value = getTheme();
      startClock();
    }

    function showSection(id, btn){
      document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
      const sec = document.getElementById(id);
      if (sec) sec.classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    function toggleTheme(){
      const next = getTheme() === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      showToast('Theme updated', `${next.charAt(0).toUpperCase() + next.slice(1)} mode enabled`);
    }

    function applyTheme(theme){
      setTheme(theme);
      const select = document.getElementById('themeSelect');
      if (select) select.value = theme;
    }

    function saveProfile(){
      const cur = readCurrent();
      if (!cur) return;
      const users = readUsers();
      const updated = {
        ...cur,
        fullName: (document.getElementById('profileName')?.value || cur.fullName || '').trim(),
        email: (document.getElementById('profileEmail')?.value || cur.email || '').trim(),
        dept: (document.getElementById('profileDept')?.value || cur.dept || '').trim(),
      };
      updated.initials = (updated.fullName || 'U').split(/\s+/).map(p => p[0]).slice(0,2).join('').toUpperCase();
      const idx = users.findIndex(u => (u.username || '').toLowerCase() === (cur.username || '').toLowerCase());
      if (idx !== -1) users[idx] = { ...users[idx], ...updated };
      writeUsers(users);
      setCurrent(updated);
      showToast('Profile saved', 'Your changes were updated locally.');
      dashboardView(updated);
    }

    function filterSearch(query){
      const q = query.trim().toLowerCase();
      const rows = document.querySelectorAll('#taskRows tr');
      rows.forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    }

    function searchFocus(){
      const el = document.getElementById('quickSearch');
      if (el) { showSection('overview', document.querySelector('.nav-btn[data-section="overview"]')); el.focus(); }
    }

    function startClock(){
      const tick = () => {
        const now = new Date();
        const clock = document.getElementById('clock');
        const dateText = document.getElementById('dateText');
        if (clock) clock.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        if (dateText) dateText.textContent = now.toLocaleDateString([], { weekday:'long', year:'numeric', month:'long', day:'numeric' });
      };
      tick();
      clearInterval(window.__raceClock);
      window.__raceClock = setInterval(tick, 1000);
    }

    // Boot
    ensureDemoUser();
    setTheme(getTheme());
    const existing = readCurrent();
    if (existing) dashboardView(existing);
    else loginView();
  </script>
</body>
</html>
